<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>머지 게임</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom right, #e9d5ff, #fbcfe8);
            height: 100vh;
            height: calc(var(--vh, 1vh) * 100);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2px;
            overflow: hidden;
        }
        .container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            padding: 12px;
            max-width: 500px;
            width: 100%;
            height: 98%;
            max-height: 98%;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        @media (max-width: 480px) {
            .container { padding: 8px 8px 4px 8px; border-radius: 12px; }
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            flex-shrink: 0;
        }
        @media (max-width: 480px) { .header { margin-bottom: 8px; } }
        .top-controls {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            gap: 8px;
            margin-bottom: 8px;
            align-items: center;
            flex-shrink: 0;
        }
        .left-controls { display: flex; gap: 6px; justify-content: flex-start; }
        .right-controls { display: flex; gap: 6px; justify-content: flex-end; }
        @media (max-width: 480px) { .top-controls { margin-bottom: 4px; gap: 4px; } }
        .next-item-wrapper { flex-shrink: 0; }
        .next-item {
            background: linear-gradient(to right, #e9d5ff, #fbcfe8);
            border-radius: 8px;
            padding: 8px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .next-emoji { font-size: 32px; }
        .next-info { font-size: 12px; color: #666; display: flex; flex-direction: column; align-items: flex-start; }
        @media (max-width: 480px) {
            .next-item { padding: 6px; gap: 6px; }
            .next-emoji { font-size: 24px; }
            .next-info { font-size: 10px; }
        }
        .mini-btn {
            padding: 5px 8px;
            border: none;
            border-radius: 6px;
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
            white-space: nowrap;
            transition: all 0.2s;
        }
        .fill-mini { background: linear-gradient(to right, #10b981, #3b82f6); color: white; }
        .fill-mini:hover { background: linear-gradient(to right, #059669, #2563eb); }
        .reset-mini { background: linear-gradient(to right, #9333ea, #ec4899); color: white; }
        .reset-mini:hover { background: linear-gradient(to right, #7e22ce, #db2777); }
        .end-mini { background: linear-gradient(to right, #dc2626, #ea580c); color: white; }
        .end-mini:hover { background: linear-gradient(to right, #b91c1c, #c2410c); }
        .ranking-mini { background: linear-gradient(to right, #f59e0b, #ef4444); color: white; }
        .ranking-mini:hover { background: linear-gradient(to right, #d97706, #dc2626); }
        h1 { color: #9333ea; font-size: 28px; }
        @media (max-width: 480px) { h1 { font-size: 22px; } }
        .score { text-align: right; }
        .score-text { color: #ec4899; font-size: 16px; font-weight: bold; }
        @media (max-width: 480px) { .score-text { font-size: 14px; } }
        .hint-text { color: #22c55e; font-size: 10px; }
        .time-text { color: #3b82f6; font-size: 10px; }
        .game-success {
            background: linear-gradient(to right, #d9f99d, #bef264);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-bottom: 6px;
            display: none;
            flex-shrink: 0;
        }
        .game-success h2 { color: #365314; font-size: 20px; margin-bottom: 2px; }
        .game-over {
            background: linear-gradient(to right, #fecaca, #fed7aa);
            border-radius: 12px;
            padding: 12px;
            text-align: center;
            margin-bottom: 6px;
            display: none;
            flex-shrink: 0;
        }
        .game-over h2 { color: #b91c1c; font-size: 20px; margin-bottom: 2px; }
        .grid-container {
            background: white;
            border: 2px solid #d8b4fe;
            border-radius: 12px;
            padding: 8px;
            margin-bottom: 4px;
            flex: 1 1 0;
            min-height: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            grid-template-rows: repeat(9, 1fr);
            gap: 2px;
            width: 100%;
            height: 100%;
        }
        .cell {
            width: 100%;
            height: 100%;
            border: 1px solid #d1d5db;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #f9fafb;
            line-height: 1;
            font-size: 80%;
        }
        .cell.has-item {
            background: linear-gradient(to bottom right, #fef3c7, #fed7aa);
            border-color: #fbbf24;
        }
        .cell.has-item:hover { transform: scale(1.1); }
        .cell:hover { background: #f3e8ff; }
        .cell.selected { border: 4px solid #3b82f6; background: #dbeafe; }
        .cell.hint { border: 4px solid #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .instructions {
            text-align: center;
            font-size: 11px;
            color: #666;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            background: white;
            padding: 4px 0;
        }
        .help-btn {
            background: #e9d5ff;
            border: none;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 11px;
            cursor: pointer;
            color: #7c3aed;
            font-weight: bold;
        }
        .help-btn:hover { background: #ddd6fe; }
        .popup-overlay {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }
        .popup-overlay.show { display: flex; }
        .popup-content {
            background: white;
            border-radius: 16px;
            padding: 20px;
            max-width: 90vw;
            max-height: 80vh;
            overflow-y: auto;
        }
        .popup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .popup-title { font-size: 20px; font-weight: bold; color: #9333ea; }
        .close-btn {
            background: #f3f4f6;
            border: none;
            border-radius: 50%;
            width: 32px; height: 32px;
            font-size: 18px;
            cursor: pointer;
            display: flex; align-items: center; justify-content: center;
        }
        .close-btn:hover { background: #e5e7eb; }
        .theme-section { margin-bottom: 20px; }
        .theme-title { font-size: 16px; font-weight: bold; color: #7c3aed; margin-bottom: 8px; }
        .evolution-chain { display: flex; align-items: center; gap: 4px; flex-wrap: wrap; }
        .evo-item { display: flex; flex-direction: column; align-items: center; gap: 2px; }
        .evo-emoji {
            font-size: 28px;
            background: linear-gradient(to bottom right, #fef3c7, #fed7aa);
            border: 2px solid #fbbf24;
            border-radius: 8px;
            width: 44px; height: 44px;
            display: flex; align-items: center; justify-content: center;
        }
        .evo-level { font-size: 9px; color: #666; }
        .arrow { font-size: 16px; color: #9ca3af; }
        .ranking-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .ranking-table th {
            background: linear-gradient(to right, #e9d5ff, #fbcfe8);
            padding: 8px; text-align: center; font-size: 14px; color: #7c3aed;
            border-bottom: 2px solid #d8b4fe;
        }
        .ranking-table td { padding: 8px; text-align: center; border-bottom: 1px solid #e5e7eb; font-size: 13px; }
        .ranking-table tr:hover { background: #faf5ff; }
        .rank-medal { font-size: 18px; }
        .name-input-container { margin-top: 12px; display: flex; flex-direction: column; gap: 8px; }
        .name-input { padding: 10px; border: 2px solid #d8b4fe; border-radius: 8px; font-size: 16px; text-align: center; }
        .submit-btn {
            padding: 10px;
            background: linear-gradient(to right, #9333ea, #ec4899);
            color: white; border: none; border-radius: 8px;
            font-size: 16px; font-weight: bold; cursor: pointer;
        }
        .submit-btn:hover { background: linear-gradient(to right, #7e22ce, #db2777); }
        .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .my-record { background: #fef3c7 !important; font-weight: bold; }
        .loading { text-align: center; padding: 20px; color: #666; }
        .confirm-popup {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            display: none;
            align-items: center; justify-content: center;
            z-index: 2000;
        }
        .confirm-box { background: white; border-radius: 16px; padding: 24px; max-width: 300px; text-align: center; }
        .confirm-message { font-size: 16px; color: #333; margin-bottom: 20px; }
        .confirm-buttons { display: flex; gap: 12px; justify-content: center; }
        .confirm-btn { padding: 10px 20px; border: none; border-radius: 8px; font-size: 14px; font-weight: bold; cursor: pointer; }
        .confirm-yes { background: linear-gradient(to right, #dc2626, #ea580c); color: white; }
        .confirm-no { background: #e5e7eb; color: #333; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>머지 게임</h1>
            <div class="score">
                <div class="score-text">점수: <span id="score">0</span></div>
                <div class="time-text">시간: <span id="time">00:00</span></div>
                <div class="hint-text">힌트: <span id="hintCount">0</span>개</div>
            </div>
        </div>
        <div class="top-controls">
            <div class="left-controls">
                <button class="mini-btn fill-mini" id="fillBtn">✨ 채우기</button>
                <button class="mini-btn ranking-mini" id="rankingBtn">🏆 랭킹</button>
            </div>
            <div class="next-item-wrapper">
                <div class="next-item">
                    <span class="next-emoji" id="nextEmoji"></span>
                    <div class="next-info">
                        <div id="nextName" style="font-weight: bold;"></div>
                        <div id="nextLevel"></div>
                    </div>
                </div>
            </div>
            <div class="right-controls">
                <button class="mini-btn reset-mini" id="resetBtn">🔄 새게임</button>
                <button class="mini-btn end-mini" id="endBtn">⏹️ 종료</button>
            </div>
        </div>

        <div id="gameSuccessBox" class="game-success">
            <h2>🎉 Lv.15 성공!</h2>
            <div style="font-size:16px;color:#365314;margin-bottom:8px;">
                점수: <span id="successScore">0</span> | 시간: <span id="successTime">00:00</span>
            </div>
            <div class="name-input-container">
                <input type="text" id="nameInputFieldSuccess" class="name-input" placeholder="닉네임을 입력하세요 (최대 10자)" maxlength="10">
                <button class="submit-btn" id="submitSuccess">🏆 랭킹 등록</button>
            </div>
        </div>

        <div id="gameOverBox" class="game-over">
            <h2>게임 오버!</h2>
            <div style="font-size:16px;color:#666;margin-bottom:8px;">
                점수: <span id="finalScore">0</span> | 시간: <span id="finalTime">00:00</span>
            </div>
            <div class="name-input-container">
                <input type="text" id="nameInputFieldOver" class="name-input" placeholder="닉네임을 입력하세요 (최대 10자)" maxlength="10">
                <button class="submit-btn" id="submitOver">🏆 랭킹 등록</button>
            </div>
        </div>

        <div id="gameEndBox" class="game-over">
            <h2>⏹️ 게임 종료</h2>
            <div style="font-size:16px;color:#666;margin-bottom:8px;">
                최고 레벨: <span id="endLevel">1</span> | 점수: <span id="endScore">0</span> | 시간: <span id="endTime">00:00</span>
            </div>
            <div class="name-input-container">
                <input type="text" id="nameInputFieldEnd" class="name-input" placeholder="닉네임을 입력하세요 (최대 10자)" maxlength="10">
                <button class="submit-btn" id="submitEnd">🏆 랭킹 등록</button>
            </div>
        </div>

        <div class="grid-container" id="gridContainer">
            <div id="grid" class="grid"></div>
        </div>

        <div class="instructions">
            <span>💡 클릭해서 선택 → 다른 칸 클릭해서 이동/합치기</span>
            <button class="help-btn" id="helpBtn">📋 진화표</button>
        </div>
    </div>

    <div id="helpPopup" class="popup-overlay">
        <div class="popup-content">
            <div class="popup-header">
                <div class="popup-title">아이템 진화표</div>
                <button class="close-btn" id="closeHelp">×</button>
            </div>
            <div id="evolutionContent"></div>
        </div>
    </div>

    <div id="rankingPopup" class="popup-overlay">
        <div class="popup-content">
            <div class="popup-header">
                <div class="popup-title">🏆 글로벌 랭킹 (Top 10)</div>
                <button class="close-btn" id="closeRanking">×</button>
            </div>
            <div id="rankingContent"></div>
        </div>
    </div>

    <div id="confirmPopup" class="confirm-popup">
        <div class="confirm-box">
            <div class="confirm-message">게임을 종료하고<br>랭킹에 등록하시겠습니까?</div>
            <div class="confirm-buttons">
                <button class="confirm-btn confirm-no" id="confirmNo">취소</button>
                <button class="confirm-btn confirm-yes" id="confirmYes">확인</button>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script>

    <script>
        const GW = 7, GH = 9;
        const THEMES = {
            fruit:   ['🍇','🍓','🍒','🍊','🍋','🍌','🍎','🍉','🍑','🍍','🥝','🥥','🍈','🥭','🫐'],
            animal:  ['🐭','🐹','🐰','🦊','🐱','🐶','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵'],
            seafood: ['🦐','🦞','🦀','🦑','🐙','🐟','🐠','🐡','🦈','🐬','🐳','🐋','🦭','🐢','🦦'],
            heart:   ['❤️','🧡','💛','💚','💙','💜','🤎','🖤','🤍','💔','❣️','💕','💞','💓','💗'],
            hand:    ['👋','🤚','🖐️','✋','🖖','👌','🤌','🤏','✌️','🤞','🤟','🤘','🤙','👈','👉'],
            sports:  ['⚽','🏀','🏈','⚾','🎾','🏐','🏉','🥎','🏓','🏸','🏑','🏒','🥊','🥋','⛳'],
            food:    ['🍕','🍔','🍗','🌭','🍟','🍰','🍪','🍩','🥐','🥖','🧀','🥓','🥚','🍱','🍜'],
            vehicle: ['🚲','🛴','🏍️','🚗','🚕','🚙','🚌','🚎','🏎️','🚓','🚑','🚒','🚐','🛻','🚚']
        };
        const NAMES = {fruit:'과일',animal:'동물',seafood:'해산물',heart:'하트',hand:'손',sports:'스포츠',food:'음식',vehicle:'탈것'};

        let grid, current, score, selected, over, hints, hintTimer, success, ended;
        let startTime, elapsedTime = 0, timeInterval;
        let lastSubmittedId = null;

        function fitGrid() {
            const container = document.getElementById('gridContainer');
            const gridEl = document.getElementById('grid');
            const cw = container.clientWidth - 16;
            const ch = container.clientHeight - 16;
            let gw = Math.min(cw, ch * 7 / 9);
            let gh = gw * 9 / 7;
            if (gh > ch) { gh = ch; gw = gh * 7 / 9; }
            gridEl.style.width  = gw + 'px';
            gridEl.style.height = gh + 'px';
            gridEl.style.fontSize = Math.floor((gh / 9) * 0.6) + 'px';
        }

        function init() {
            grid = Array(GH).fill(0).map(() => Array(GW).fill(null));
            for (let r = 0; r < GH; r++)
                for (let c = 0; c < GW; c++)
                    grid[r][c] = random();
            score = 0; selected = null; over = false; success = false; ended = false; hints = [];
            current = random();
            elapsedTime = 0; startTime = Date.now();
            startTimer(); render(); startHint();
        }

        function startTimer() {
            if (timeInterval) clearInterval(timeInterval);
            timeInterval = setInterval(() => {
                if (!over && !success && !ended) {
                    elapsedTime = Math.floor((Date.now() - startTime) / 1000);
                    updateTimeDisplay();
                }
            }, 1000);
        }

        function updateTimeDisplay() {
            const m = Math.floor(elapsedTime/60), s = elapsedTime%60;
            const t = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
            document.getElementById('time').textContent = t;
            return t;
        }

        function random() {
            const ts = Object.keys(THEMES);
            return { theme: ts[Math.floor(Math.random()*ts.length)], level: Math.floor(Math.random()*3) };
        }

        function render() {
            document.getElementById('score').textContent = score;
            document.getElementById('hintCount').textContent = hints.length;
            if (current) {
                document.getElementById('nextEmoji').textContent = THEMES[current.theme][current.level];
                document.getElementById('nextName').textContent  = NAMES[current.theme];
                document.getElementById('nextLevel').textContent = `Lv.${current.level+1}`;
            }
            const t = updateTimeDisplay();
            if (success) {
                document.getElementById('gameSuccessBox').style.display = 'block';
                document.getElementById('gameOverBox').style.display    = 'none';
                document.getElementById('gameEndBox').style.display     = 'none';
                document.getElementById('successScore').textContent = score;
                document.getElementById('successTime').textContent  = t;
            } else if (ended) {
                document.getElementById('gameEndBox').style.display     = 'block';
                document.getElementById('gameSuccessBox').style.display = 'none';
                document.getElementById('gameOverBox').style.display    = 'none';
                document.getElementById('endLevel').textContent = getMaxLevel();
                document.getElementById('endScore').textContent = score;
                document.getElementById('endTime').textContent  = t;
            } else if (over) {
                document.getElementById('gameOverBox').style.display    = 'block';
                document.getElementById('gameSuccessBox').style.display = 'none';
                document.getElementById('gameEndBox').style.display     = 'none';
                document.getElementById('finalScore').textContent = score;
                document.getElementById('finalTime').textContent  = t;
            } else {
                document.getElementById('gameOverBox').style.display    = 'none';
                document.getElementById('gameSuccessBox').style.display = 'none';
                document.getElementById('gameEndBox').style.display     = 'none';
            }

            const g = document.getElementById('grid');
            g.innerHTML = '';
            if (ended || over || success) return;

            for (let r = 0; r < GH; r++) {
                for (let c = 0; c < GW; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    const item = grid[r][c];
                    if (item) { cell.classList.add('has-item'); cell.textContent = THEMES[item.theme][item.level]; }
                    if (selected && selected.r===r && selected.c===c) cell.classList.add('selected');
                    if (hints.find(h => h.r===r && h.c===c)) cell.classList.add('hint');
                    cell.onclick = () => clickCell(r, c);
                    g.appendChild(cell);
                }
            }
            fitGrid();
        }

        function clickCell(r, c) {
            if (over || success || ended) return;
            const isHint = hints.find(h => h.r===r && h.c===c);
            if (!isHint) { hints = []; if (hintTimer) clearTimeout(hintTimer); }

            if (selected) {
                if (selected.r===r && selected.c===c) { selected=null; render(); if(!isHint) startHint(); return; }
                const tgt=grid[r][c], sel=selected.item;
                if (tgt && tgt.theme===sel.theme && tgt.level===sel.level && sel.level<14) {
                    const nl=sel.level+1;
                    grid[r][c]={theme:sel.theme,level:nl};
                    grid[selected.r][selected.c]=null;
                    score+=nl*10;
                    if(nl===14){success=true;clearInterval(timeInterval);render();return;}
                    selected=null;hints=[];render();checkOver();startHint();
                } else if (!tgt) {
                    grid[r][c]=sel;grid[selected.r][selected.c]=null;selected=null;render();startHint();
                } else {
                    grid[r][c]=sel;grid[selected.r][selected.c]=tgt;selected=null;render();startHint();
                }
                return;
            }

            if (current) {
                const tgt=grid[r][c];
                if (tgt && tgt.theme===current.theme && tgt.level===current.level && current.level<14) {
                    const nl=current.level+1;
                    grid[r][c]={theme:current.theme,level:nl};
                    score+=nl*10;
                    if(nl===14){success=true;clearInterval(timeInterval);render();return;}
                    current=random();hints=[];render();checkOver();startHint();
                } else if (!tgt) {
                    grid[r][c]=current;current=random();render();checkOver();startHint();
                } else {
                    selected={r,c,item:tgt};render();if(!isHint)startHint();
                }
            } else if (grid[r][c]) {
                selected={r,c,item:grid[r][c]};render();if(!isHint)startHint();
            }
        }

        function checkOver() {
            let empty=false;
            outer: for(let r=0;r<GH;r++) for(let c=0;c<GW;c++) if(!grid[r][c]){empty=true;break outer;}
            if(empty) return;
            for(let r=0;r<GH;r++) for(let c=0;c<GW;c++){
                const cell=grid[r][c]; if(cell.level>=14) continue;
                if(r>0    && grid[r-1][c] && grid[r-1][c].theme===cell.theme && grid[r-1][c].level===cell.level) return;
                if(r<GH-1 && grid[r+1][c] && grid[r+1][c].theme===cell.theme && grid[r+1][c].level===cell.level) return;
                if(c>0    && grid[r][c-1] && grid[r][c-1].theme===cell.theme && grid[r][c-1].level===cell.level) return;
                if(c<GW-1 && grid[r][c+1] && grid[r][c+1].theme===cell.theme && grid[r][c+1].level===cell.level) return;
            }
            over=true; clearInterval(timeInterval); render();
        }

        function startHint() {
            if (hintTimer) clearTimeout(hintTimer);
            hintTimer = setTimeout(() => {
                const map = new Map();
                for(let r=0;r<GH;r++) for(let c=0;c<GW;c++){
                    const cell=grid[r][c]; if(!cell||cell.level>=14) continue;
                    const k=`${cell.theme}-${cell.level}`;
                    if(!map.has(k)) map.set(k,[]);
                    map.get(k).push({r,c});
                }
                for(const[,ps] of map){
                    if(ps.length>=2){hints=ps.sort(()=>Math.random()-.5).slice(0,2);render();return;}
                }
                hints=[]; render();
            }, 10000);
        }

        function fillEmpty() {
            if(over||success||ended) return;
            for(let r=0;r<GH;r++) for(let c=0;c<GW;c++) if(!grid[r][c]) grid[r][c]=random();
            render(); checkOver(); startHint();
        }

        function resetGame() {
            if(hintTimer) clearTimeout(hintTimer);
            if(timeInterval) clearInterval(timeInterval);
            lastSubmittedId=null; init();
        }

        function getMaxLevel() {
            let m=0;
            for(let r=0;r<GH;r++) for(let c=0;c<GW;c++) if(grid[r][c]&&grid[r][c].level>m) m=grid[r][c].level;
            return m+1;
        }

        async function submitRanking(type) {
            const fieldId = type==='success' ? 'nameInputFieldSuccess'
                          : type==='end'     ? 'nameInputFieldEnd'
                                             : 'nameInputFieldOver';
            const btnId   = type==='success' ? 'submitSuccess'
                          : type==='end'     ? 'submitEnd'
                                             : 'submitOver';
            const field = document.getElementById(fieldId);
            const btn   = document.getElementById(btnId);
            const name  = field.value.trim();
            if (!name) { alert('닉네임을 입력해주세요!'); return; }
            btn.disabled=true; btn.textContent='등록 중...';
            try {
                const record = {
                    name, score, time: elapsedTime,
                    level: success ? 15 : getMaxLevel(),
                    timestamp: Date.now(), date: new Date().toISOString()
                };
                const ref = await window.db.collection('rankings').add(record);
                lastSubmittedId = ref.id;
                field.value='';
                showRanking();
            } catch(e) {
                alert('랭킹 등록 실패: ' + e.message);
            } finally {
                btn.disabled=false; btn.textContent='🏆 랭킹 등록';
            }
        }

        async function showRanking() {
            const content = document.getElementById('rankingContent');
            content.innerHTML = '<div class="loading">랭킹 불러오는 중...</div>';
            document.getElementById('rankingPopup').classList.add('show');
            try {
                const snap = await window.db.collection('rankings')
                    .orderBy('level','desc').orderBy('time','asc').orderBy('score','desc')
                    .limit(50).get();
                const rankings = snap.docs.map(d=>({id:d.id,...d.data()}));
                const myIndex  = lastSubmittedId ? rankings.findIndex(r=>r.id===lastSubmittedId) : -1;
                const top10    = rankings.slice(0,10);
                if (!top10.length) { content.innerHTML='<p style="text-align:center;color:#666;padding:20px;">아직 등록된 랭킹이 없습니다.</p>'; return; }
                const medals = ['🥇','🥈','🥉'];
                let html = '<table class="ranking-table"><thead><tr><th>순위</th><th>닉네임</th><th>레벨</th><th>시간</th><th>점수</th></tr></thead><tbody>';
                top10.forEach((rec,i)=>{
                    const medal = medals[i] ?? (i+1);
                    const m=Math.floor(rec.time/60), s=rec.time%60;
                    const t=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    const mine = lastSubmittedId && rec.id===lastSubmittedId;
                    html+=`<tr class="${mine?'my-record':''}"><td class="rank-medal">${medal}</td><td>${rec.name}</td><td>Lv.${rec.level}</td><td>${t}</td><td>${rec.score}</td></tr>`;
                });
                html+='</tbody></table>';
                if (myIndex>=10) {
                    const rec=rankings[myIndex];
                    const m=Math.floor(rec.time/60),s=rec.time%60;
                    const t=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
                    html+=`<div style="margin-top:12px;padding:10px;background:#fef3c7;border-radius:8px;text-align:center;font-size:13px;">
                        <div style="color:#92400e;font-weight:bold;margin-bottom:4px;">📍 내 순위: ${myIndex+1}위</div>
                        <div style="color:#666;">${rec.name} | Lv.${rec.level} | ${t} | ${rec.score}점</div>
                    </div>`;
                }
                content.innerHTML=html;
            } catch(e) {
                content.innerHTML='<p style="text-align:center;color:#ef4444;padding:20px;">랭킹을 불러오지 못했습니다.</p>';
            }
        }

        function showHelp() {
            const content=document.getElementById('evolutionContent');
            content.innerHTML='';
            for(const[tk,emojis] of Object.entries(THEMES)){
                const sec=document.createElement('div'); sec.className='theme-section';
                const tit=document.createElement('div'); tit.className='theme-title'; tit.textContent=NAMES[tk];
                sec.appendChild(tit);
                const chain=document.createElement('div'); chain.className='evolution-chain';
                for(let i=0;i<15;i++){
                    const item=document.createElement('div'); item.className='evo-item';
                    const em=document.createElement('div'); em.className='evo-emoji'; em.textContent=emojis[i];
                    const lv=document.createElement('div'); lv.className='evo-level'; lv.textContent=`Lv.${i+1}`;
                    item.appendChild(em); item.appendChild(lv); chain.appendChild(item);
                    if(i<14){const ar=document.createElement('div');ar.className='arrow';ar.textContent='→';chain.appendChild(ar);}
                }
                sec.appendChild(chain); content.appendChild(sec);
            }
            document.getElementById('helpPopup').classList.add('show');
        }

        document.getElementById('fillBtn').addEventListener('click', fillEmpty);
        document.getElementById('resetBtn').addEventListener('click', resetGame);
        document.getElementById('helpBtn').addEventListener('click', showHelp);
        document.getElementById('closeHelp').addEventListener('click', ()=>document.getElementById('helpPopup').classList.remove('show'));
        document.getElementById('rankingBtn').addEventListener('click', showRanking);
        document.getElementById('closeRanking').addEventListener('click', ()=>document.getElementById('rankingPopup').classList.remove('show'));
        document.getElementById('rankingPopup').addEventListener('click', e=>{ if(e.target===e.currentTarget) document.getElementById('rankingPopup').classList.remove('show'); });
        document.getElementById('helpPopup').addEventListener('click', e=>{ if(e.target===e.currentTarget) document.getElementById('helpPopup').classList.remove('show'); });
        document.getElementById('submitSuccess').addEventListener('click', ()=>submitRanking('success'));
        document.getElementById('submitOver').addEventListener('click',    ()=>submitRanking('over'));
        document.getElementById('submitEnd').addEventListener('click',     ()=>submitRanking('end'));
        document.getElementById('endBtn').addEventListener('click', ()=>document.getElementById('confirmPopup').style.display='flex');
        document.getElementById('confirmNo').addEventListener('click',  ()=>document.getElementById('confirmPopup').style.display='none');
        document.getElementById('confirmYes').addEventListener('click', ()=>{
            document.getElementById('confirmPopup').style.display='none';
            if(hintTimer) clearTimeout(hintTimer);
            if(timeInterval) clearInterval(timeInterval);
            ended=true; render();
        });

        function setVH() { document.documentElement.style.setProperty('--vh',(window.innerHeight*0.01)+'px'); }
        window.addEventListener('resize', ()=>{ setVH(); fitGrid(); });
        window.addEventListener('orientationchange', ()=>{ setVH(); setTimeout(fitGrid,300); });
        setVH();
        init();
    </script>
</body>
</html>
