<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>머지 게임</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to bottom right, #e9d5ff, #fbcfe8);
            height:100vh; height:calc(var(--vh,1vh)*100);
            display:flex; justify-content:center; align-items:center;
            padding:2px; overflow:hidden;
        }
        .container {
            background:white; border-radius:16px;
            box-shadow:0 20px 50px rgba(0,0,0,0.2);
            padding:12px; max-width:500px; width:100%;
            height:98%; max-height:98%;
            display:flex; flex-direction:column; overflow:hidden;
        }
        @media(max-width:480px){ .container{padding:8px 8px 4px 8px; border-radius:12px;} }
        .header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; flex-shrink:0; }
        .top-controls{ display:grid; grid-template-columns:1fr auto 1fr; gap:8px; margin-bottom:6px; align-items:center; flex-shrink:0; }
        .left-controls{ display:flex; gap:6px; justify-content:flex-start; }
        .right-controls{ display:flex; gap:6px; justify-content:flex-end; }
        .next-item{ background:linear-gradient(to right,#e9d5ff,#fbcfe8); border-radius:8px; padding:6px 10px; text-align:center; display:flex; align-items:center; justify-content:center; gap:8px; }
        .next-emoji{ font-size:28px; }
        .next-info{ font-size:11px; color:#666; display:flex; flex-direction:column; align-items:flex-start; }
        .mini-btn{ padding:5px 8px; border:none; border-radius:6px; font-size:11px; font-weight:bold; cursor:pointer; white-space:nowrap; transition:all 0.2s; }
        .fill-mini{ background:linear-gradient(to right,#10b981,#3b82f6); color:white; }
        .reset-mini{ background:linear-gradient(to right,#9333ea,#ec4899); color:white; }
        .end-mini{ background:linear-gradient(to right,#dc2626,#ea580c); color:white; }
        .ranking-mini{ background:linear-gradient(to right,#f59e0b,#ef4444); color:white; }
        h1{ color:#9333ea; font-size:26px; }
        @media(max-width:480px){ h1{font-size:20px;} }
        .score{ text-align:right; }
        .score-text{ color:#ec4899; font-size:15px; font-weight:bold; }
        .hint-text{ color:#22c55e; font-size:10px; }
        .time-text{ color:#3b82f6; font-size:12px; font-weight:bold; }
        .time-text.urgent{ color:#dc2626; font-weight:900; font-size:14px; animation:urgentPulse 0.5s infinite alternate; }
        @keyframes urgentPulse{ from{color:#dc2626} to{color:#ff6b6b} }
        .status-bars{ flex-shrink:0; display:flex; flex-direction:column; gap:3px; margin-bottom:4px; }
        .bar-row{ display:flex; align-items:center; gap:6px; }
        .bar-label{ font-size:10px; font-weight:bold; min-width:38px; color:#f59e0b; }
        .bar-bg{ flex:1; height:8px; background:#f3e8ff; border-radius:6px; overflow:hidden; border:1px solid #d8b4fe; }
        .bar-fill{ height:100%; width:0%; border-radius:6px; transition:width 0.3s ease; background:linear-gradient(to right,#f59e0b,#ef4444,#ec4899); }
        .bar-count{ font-size:10px; color:#666; min-width:38px; text-align:right; white-space:nowrap; }
        .fever-2x-badge{ display:none; position:fixed; top:10px; left:50%; transform:translateX(-50%); background:linear-gradient(to right,#f59e0b,#ef4444); color:white; font-size:13px; font-weight:900; padding:5px 16px; border-radius:20px; z-index:600; box-shadow:0 4px 16px rgba(245,158,11,0.5); animation:badgePulse 0.6s infinite alternate; }
        .fever-2x-badge.show{ display:block; }
        @keyframes badgePulse{ from{box-shadow:0 4px 16px rgba(245,158,11,0.4)} to{box-shadow:0 4px 28px rgba(236,72,153,0.7)} }
        .game-success{ background:linear-gradient(to right,#d9f99d,#bef264); border-radius:12px; padding:10px; text-align:center; margin-bottom:4px; display:none; flex-shrink:0; }
        .game-success h2{ color:#365314; font-size:18px; }
        .game-over{ background:linear-gradient(to right,#fecaca,#fed7aa); border-radius:12px; padding:10px; text-align:center; margin-bottom:4px; display:none; flex-shrink:0; }
        .game-over h2{ color:#b91c1c; font-size:18px; }
        .game-timeout{ background:linear-gradient(to right,#fde68a,#fca5a5); border-radius:12px; padding:10px; text-align:center; margin-bottom:4px; display:none; flex-shrink:0; }
        .game-timeout h2{ color:#92400e; font-size:18px; }
        .grid-container{ background:white; border:2px solid #d8b4fe; border-radius:12px; padding:8px; margin-bottom:4px; flex:1 1 0; min-height:0; display:flex; align-items:center; justify-content:center; overflow:hidden; }
        .grid-container.fever-active-border{ border-color:#f59e0b !important; box-shadow:0 0 16px rgba(245,158,11,0.5); animation:feverBorder 0.5s infinite alternate; }
        @keyframes feverBorder{ from{border-color:#f59e0b} to{border-color:#ec4899} }
        .grid{ display:grid; grid-template-columns:repeat(7,1fr); grid-template-rows:repeat(9,1fr); gap:2px; }
        .cell{ width:100%; height:100%; border:1px solid #d1d5db; border-radius:4px; display:flex; align-items:center; justify-content:center; cursor:pointer; transition:all 0.15s; background:#f9fafb; line-height:1; font-size:80%; position:relative; user-select:none; }
        .cell.has-item{ background:linear-gradient(to bottom right,#fef3c7,#fed7aa); border-color:#fbbf24; }
        .cell.has-item:hover{ transform:scale(1.08); }
        .cell:hover{ background:#f3e8ff; }
        .cell.selected{ border:3px solid #3b82f6 !important; background:#dbeafe !important; }
        .cell.hint{ border:3px solid #22c55e; animation:pulse 2s infinite; }
        @keyframes pulse{ 0%,100%{opacity:1} 50%{opacity:0.5} }
        .cell.special-time{ background:linear-gradient(135deg,#6ee7b7,#34d399) !important; border:2px solid #059669 !important; animation:specialPulse 0.8s infinite alternate; }
        .cell.special-theme{ background:linear-gradient(135deg,#fbbf24,#f97316) !important; border:2px solid #d97706 !important; animation:specialPulse 0.8s infinite alternate; }
        .cell.special-selected{ border:3px solid #7c3aed !important; box-shadow:0 0 10px rgba(124,58,237,0.6); }
        @keyframes specialPulse{ from{box-shadow:0 0 4px rgba(124,58,237,0.5)} to{box-shadow:0 0 12px rgba(124,58,237,0.9)} }
        .cell.merge-highlight{ border:3px solid #7c3aed !important; animation:highlightPop 0.4s ease-out, highlightGlow 1.5s infinite alternate; }
        @keyframes highlightPop{ 0%{transform:scale(1.3)} 100%{transform:scale(1)} }
        @keyframes highlightGlow{ from{box-shadow:0 0 6px rgba(124,58,237,0.6)} to{box-shadow:0 0 16px rgba(236,72,153,0.9)} }
        .theme-select-popup{ position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.6); display:none; align-items:center; justify-content:center; z-index:1500; }
        .theme-select-popup.show{ display:flex; }
        .theme-select-box{ background:white; border-radius:16px; padding:20px; max-width:320px; width:90%; text-align:center; }
        .theme-select-title{ font-size:16px; font-weight:bold; color:#9333ea; margin-bottom:12px; }
        .theme-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:8px; }
        .theme-btn{ padding:8px 4px; border:2px solid #d8b4fe; border-radius:8px; background:#faf5ff; cursor:pointer; font-size:11px; font-weight:bold; color:#7c3aed; transition:all 0.2s; display:flex; flex-direction:column; align-items:center; gap:2px; }
        .theme-btn:hover{ background:#e9d5ff; border-color:#9333ea; }
        .theme-btn .t-emoji{ font-size:20px; }
        .cancel-theme-btn{ margin-top:12px; padding:8px 20px; border:none; border-radius:8px; background:#e5e7eb; color:#333; font-size:13px; font-weight:bold; cursor:pointer; }
        .instructions{ text-align:center; font-size:11px; color:#666; flex-shrink:0; display:flex; align-items:center; justify-content:center; gap:8px; padding:3px 0; }
        .help-btn{ background:#e9d5ff; border:none; border-radius:6px; padding:4px 8px; font-size:11px; cursor:pointer; color:#7c3aed; font-weight:bold; }
        .popup-overlay{ position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:1000; }
        .popup-overlay.show{ display:flex; }
        .popup-content{ background:white; border-radius:16px; padding:20px; max-width:90vw; max-height:80vh; overflow-y:auto; }
        .popup-header{ display:flex; justify-content:space-between; align-items:center; margin-bottom:16px; }
        .popup-title{ font-size:18px; font-weight:bold; color:#9333ea; }
        .close-btn{ background:#f3f4f6; border:none; border-radius:50%; width:32px; height:32px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
        .theme-section{ margin-bottom:16px; }
        .theme-title{ font-size:14px; font-weight:bold; color:#7c3aed; margin-bottom:6px; }
        .evolution-chain{ display:flex; align-items:center; gap:4px; flex-wrap:wrap; }
        .evo-item{ display:flex; flex-direction:column; align-items:center; gap:2px; }
        .evo-emoji{ font-size:24px; background:linear-gradient(to bottom right,#fef3c7,#fed7aa); border:2px solid #fbbf24; border-radius:6px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
        .evo-level{ font-size:8px; color:#666; }
        .arrow{ font-size:14px; color:#9ca3af; }
        .name-input-container{ margin-top:10px; display:flex; flex-direction:column; gap:8px; }
        .name-input{ padding:10px; border:2px solid #d8b4fe; border-radius:8px; font-size:15px; text-align:center; }
        .submit-btn{ padding:10px; background:linear-gradient(to right,#9333ea,#ec4899); color:white; border:none; border-radius:8px; font-size:15px; font-weight:bold; cursor:pointer; }
        .confirm-popup{ position:fixed; top:0;left:0;right:0;bottom:0; background:rgba(0,0,0,0.5); display:none; align-items:center; justify-content:center; z-index:2000; }
        .confirm-box{ background:white; border-radius:16px; padding:24px; max-width:280px; text-align:center; }
        .confirm-message{ font-size:15px; color:#333; margin-bottom:16px; }
        .confirm-buttons{ display:flex; gap:12px; justify-content:center; }
        .confirm-btn{ padding:10px 18px; border:none; border-radius:8px; font-size:13px; font-weight:bold; cursor:pointer; }
        .confirm-yes{ background:linear-gradient(to right,#dc2626,#ea580c); color:white; }
        .confirm-no{ background:#e5e7eb; color:#333; }
        #endingScreen{ position:fixed; top:0;left:0;right:0;bottom:0; z-index:99999; display:none; flex-direction:column; align-items:center; justify-content:center; pointer-events:none; overflow:hidden; }
        #endingScreen.show{ display:flex; }
        .ending-title-box{ background:linear-gradient(135deg,#f59e0b,#ef4444,#ec4899,#8b5cf6); border-radius:24px; padding:24px 48px; text-align:center; box-shadow:0 8px 40px rgba(236,72,153,0.7); animation:endingPop 0.4s cubic-bezier(0.34,1.56,0.64,1) forwards; transform:scale(0); }
        @keyframes endingPop{ to{transform:scale(1);} }
        .ending-title{ font-size:38px; font-weight:900; color:white; text-shadow:0 2px 12px rgba(0,0,0,0.3); }
        .ending-sub{ font-size:18px; font-weight:bold; color:rgba(255,255,255,0.9); margin-top:8px; }
        .confetti-piece{ position:absolute; width:10px; height:12px; border-radius:2px; animation:confettiFall linear forwards, confettiGlow 0.3s infinite alternate; }
        @keyframes confettiFall{ 0%{opacity:1;transform:translateY(-10px) rotate(0deg) scale(1);} 100%{opacity:0;transform:translateY(105vh) rotate(800deg) scale(0.5);} }
        @keyframes confettiGlow{ from{box-shadow:0 0 4px 2px rgba(255,255,255,0.6);border:2px solid rgba(255,255,255,0.6);} to{box-shadow:0 0 12px 6px rgba(255,255,255,1);border:2px solid rgba(255,255,255,1);} }
        .star-piece{ position:absolute; font-size:24px; animation:starPop ease-out forwards; }
        @keyframes starPop{ 0%{opacity:0;transform:scale(0) rotate(0deg);} 40%{opacity:1;transform:scale(1.3) rotate(180deg);} 100%{opacity:0;transform:scale(0.5) rotate(360deg) translateY(-80px);} }
    </style>
</head>
<body>
<div class="fever-2x-badge" id="fever2xBadge">🔥 점수 2배! <span id="feverCountdown">10</span>초</div>
<div id="endingScreen">
    <div class="ending-title-box">
        <div class="ending-title" id="endingTitle"></div>
        <div class="ending-sub" id="endingSub"></div>
    </div>
</div>
<div class="container">
    <div class="header">
        <h1>머지 게임</h1>
        <div class="score">
            <div class="score-text">점수: <span id="score">0</span></div>
            <div class="time-text" id="timeDisplay">⏱️ <span id="time">03:00</span></div>
            <div class="hint-text">힌트: <span id="hintCount">0</span>개</div>
        </div>
    </div>
    <div class="status-bars">
        <div class="bar-row">
            <div class="bar-label">🔥피버</div>
            <div class="bar-bg"><div class="bar-fill" id="feverBarFill"></div></div>
            <div class="bar-count" id="feverBarCount">0/12</div>
        </div>
    </div>
    <div class="top-controls">
        <div class="left-controls">
            <button class="mini-btn ranking-mini" id="rankingBtn">🏆 랭킹</button>
            <button class="mini-btn fill-mini" id="fillBtn">✨ 채우기</button>
        </div>
        <div class="next-item-wrapper">
            <div class="next-item">
                <span class="next-emoji" id="nextEmoji"></span>
                <div class="next-info">
                    <div id="nextName" style="font-weight:bold;"></div>
                    <div id="nextLevel"></div>
                </div>
            </div>
        </div>
        <div class="right-controls">
            <button class="mini-btn reset-mini" id="resetBtn">🔄 새게임</button>
            <button class="mini-btn end-mini" id="endBtn">⏹️ 종료</button>
        </div>
    </div>
    <div id="gameSuccessBox" class="game-success">
        <h2>🎉 Lv.15 성공!</h2>
        <div style="font-size:14px;color:#365314;margin-bottom:6px;">점수: <span id="successScore">0</span> | 남은시간: <span id="successTime">00:00</span></div>
        <div class="name-input-container">
            <input type="text" id="nameInputFieldSuccess" class="name-input" placeholder="닉네임 (최대 10자)" maxlength="10">
            <button class="submit-btn" id="submitSuccess">🏆 랭킹 등록</button>
        </div>
    </div>
    <div id="gameOverBox" class="game-over">
        <h2>게임 오버!</h2>
        <div style="font-size:14px;color:#666;margin-bottom:6px;">점수: <span id="finalScore">0</span> | 최고 레벨: Lv.<span id="finalLevel">1</span></div>
        <div class="name-input-container">
            <input type="text" id="nameInputFieldOver" class="name-input" placeholder="닉네임 (최대 10자)" maxlength="10">
            <button class="submit-btn" id="submitOver">🏆 랭킹 등록</button>
        </div>
    </div>
    <div id="gameTimeoutBox" class="game-timeout">
        <h2>⏰ 시간 종료!</h2>
        <div style="font-size:14px;color:#92400e;margin-bottom:6px;">최고 레벨: Lv.<span id="timeoutLevel">1</span> | 점수: <span id="timeoutScore">0</span></div>
        <div class="name-input-container">
            <input type="text" id="nameInputFieldTimeout" class="name-input" placeholder="닉네임 (최대 10자)" maxlength="10">
            <button class="submit-btn" id="submitTimeout">🏆 랭킹 등록</button>
        </div>
    </div>
    <div id="gameEndBox" class="game-over">
        <h2>⏹️ 게임 종료</h2>
        <div style="font-size:14px;color:#666;margin-bottom:6px;">최고 레벨: Lv.<span id="endLevel">1</span> | 점수: <span id="endScore">0</span></div>
        <div class="name-input-container">
            <input type="text" id="nameInputFieldEnd" class="name-input" placeholder="닉네임 (최대 10자)" maxlength="10">
            <button class="submit-btn" id="submitEnd">🏆 랭킹 등록</button>
        </div>
    </div>
    <div class="grid-container" id="gridContainer">
        <div id="grid" class="grid"></div>
    </div>
    <div class="instructions">
        <span id="instrText">💡 클릭 선택 → 다른 칸으로 이동/합치기</span>
        <button class="help-btn" id="helpBtn">📋 도움말</button>
    </div>
</div>
<div class="theme-select-popup" id="themeSelectPopup">
    <div class="theme-select-box">
        <div class="theme-select-title">🌀 테마를 선택하세요</div>
        <div class="theme-grid" id="themeSelectGrid"></div>
        <button class="cancel-theme-btn" id="cancelThemeBtn">취소</button>
    </div>
</div>
<div id="helpPopup" class="popup-overlay">
    <div class="popup-content">
        <div class="popup-header">
            <div class="popup-title">📋 도움말</div>
            <button class="close-btn" id="closeHelp">×</button>
        </div>
        <div id="helpContent"></div>
    </div>
</div>
<div id="rankingPopup" class="popup-overlay">
    <div class="popup-content">
        <div class="popup-header">
            <div class="popup-title">🏆 글로벌 랭킹 Top 10</div>
            <button class="close-btn" id="closeRanking">×</button>
        </div>
        <div style="text-align:center;padding:20px;color:#aaa;">미리보기 모드 (Firebase 미연결)</div>
    </div>
</div>
<div id="confirmPopup" class="confirm-popup">
    <div class="confirm-box">
        <div class="confirm-message">게임을 종료하고<br>랭킹에 등록하시겠습니까?</div>
        <div class="confirm-buttons">
            <button class="confirm-btn confirm-no" id="confirmNo">취소</button>
            <button class="confirm-btn confirm-yes" id="confirmYes">확인</button>
        </div>
    </div>
</div>

    const FB=[['C',3,.08,0],['C',3,.08,.24],['G',3,.08,.48],['G',3,.08,.72],['C',3,.08,1.00],['G',3,.08,1.20],['C',3,.08,1.40],['G',3,.08,1.60],['F',3,.08,1.90],['C',3,.08,2.10],['G',3,.08,2.40],['D',4,.08,2.60],['C',3,.08,2.80],['G',3,.08,3.00],['C',3,.08,3.20],['G',3,.08,3.50],['C',3,.08,3.80],['G',3,.08,4.00],['C',3,.08,4.30],['G',3,.08,4.54],['C',4,.08,4.78],['G',3,.08,5.02],['C',3,.08,5.30],['G',3,.08,5.50],['A',3,.08,5.70],['F',3,.08,5.90],['C',3,.08,6.30],['G',3,.08,6.58],['C',3,.08,6.86],['G',3,.08,7.18],['C',3,.12,7.54],['G',3,.12,7.72]];
    const FL=8.40;
    const EM=[
        ['G',4,.55,0.00],['E',4,.55,0.70],['C',4,.55,1.40],

        ['F',4,.80,17.20],['E',4,.55,18.10],['D',4,.55,18.80],
        ['C',4,1.20,19.50],
    ];
    const EB=[
        ['C',2,.30,0.00],['G',2,.30,1.40],['F',2,.30,2.20],['C',2,.30,3.60],
        ['F',2,.30,4.60],['C',2,.30,6.00],['G',2,.30,6.70],

        ['A',2,.30,11.70],['F',2,.30,12.95],['E',2,.30,14.05],
        ['C',2,.30,15.10],['G',2,.30,16.50],['F',2,.30,18.10],
        ['C',2,.50,19.50],
    ];
    const EL=21.20;

    function pn(n,o,d,w,v,g){
        const osc=actx.createOscillator(),gn=actx.createGain();
        osc.type='triangle';osc.frequency.setValueAtTime(fr(n,o),w);
        gn.gain.setValueAtTime(0,w);gn.gain.linearRampToValueAtTime(v,w+.012);
        gn.gain.exponentialRampToValueAtTime(v*.25,w+d*.55);gn.gain.exponentialRampToValueAtTime(.0001,w+d);
        osc.connect(gn);gn.connect(g);osc.start(w);osc.stop(w+d+.05);
    }
    function sN(){if(!playing||isFever||isEnding)return;const t=actx.currentTime;NM.forEach(([n,o,d,dt])=>pn(n,o,d,t+dt,.22,ng));NB.forEach(([n,o,d,dt])=>pn(n,o,d,t+dt,.10,ng));nLoop=setTimeout(sN,(NL-.05)*1000);}
    function sF(){if(!playing||!isFever||isEnding)return;const t=actx.currentTime;FM.forEach(([n,o,d,dt])=>pn(n,o,d,t+dt,.28,fg));FB.forEach(([n,o,d,dt])=>pn(n,o,d,t+dt,.13,fg));fLoop=setTimeout(sF,(FL-.05)*1000);}
    function sE(){if(!playing||!isEnding)return;const t=actx.currentTime;EM.forEach(([n,o,d,dt])=>pn(n,o,d,t+dt,.20,eg));EB.forEach(([n,o,d,dt])=>pn(n,o,d,t+dt,.09,eg));eLoop=setTimeout(sE,(EL-.05)*1000);}
    function cf(a,b,dur){const t=actx.currentTime;a.gain.setValueAtTime(a.gain.value,t);a.gain.linearRampToValueAtTime(0,t+dur);b.gain.setValueAtTime(0,t);b.gain.linearRampToValueAtTime(.7,t+dur);}
    function setup(){
        actx=new(window.AudioContext||window.webkitAudioContext)();
        master=actx.createGain();master.gain.value=1;master.connect(actx.destination);
        ng=actx.createGain();ng.gain.value=.7;ng.connect(master);
        fg=actx.createGain();fg.gain.value=0;fg.connect(master);
        eg=actx.createGain();eg.gain.value=0;eg.connect(master);
    }
    function clearAll(){clearTimeout(nLoop);clearTimeout(fLoop);clearTimeout(eLoop);}

    return {
        start(){
            if(started)return;
            started=true;setup();
            if(actx.state==='suspended')actx.resume();
            playing=true;isFever=false;isEnding=false;
            sN();
        },
        // 완전히 상태 리셋 후 평소 BGM 재시작
        restart(){
            if(!started){this.start();return;}
            clearAll();playing=false;isFever=false;isEnding=false;
            if(actx.state==='suspended')actx.resume();
            const t=actx.currentTime;
            // 모든 gain 즉시 0으로 끊기
            ng.gain.cancelScheduledValues(t);ng.gain.setValueAtTime(0,t);
            fg.gain.cancelScheduledValues(t);fg.gain.setValueAtTime(0,t);
            eg.gain.cancelScheduledValues(t);eg.gain.setValueAtTime(0,t);
            // 짧게 페이드인으로 평소 BGM 시작
            playing=true;
            ng.gain.linearRampToValueAtTime(.7,t+0.3);
            sN();
        },
        switchFever(){
            if(!started||isEnding)return;
            isFever=true;clearTimeout(nLoop);
            cf(ng,fg,.5);setTimeout(sF,100);
        },
        switchNormal(){
            if(!started||isEnding)return;
            isFever=false;clearTimeout(fLoop);
            cf(fg,ng,.8);setTimeout(sN,100);
        },
        switchEnding(){
            if(!started)return;
            isEnding=true;isFever=false;
            clearAll();
            const t=actx.currentTime;
            ng.gain.cancelScheduledValues(t);ng.gain.setValueAtTime(ng.gain.value,t);ng.gain.linearRampToValueAtTime(0,t+1.5);
            fg.gain.cancelScheduledValues(t);fg.gain.setValueAtTime(fg.gain.value,t);fg.gain.linearRampToValueAtTime(0,t+1.5);
            eg.gain.cancelScheduledValues(t);eg.gain.setValueAtTime(0,t);eg.gain.linearRampToValueAtTime(.7,t+1.5);
            setTimeout(sE,200);
        },
    };
})();

// ───────────── 게임 ─────────────
const GW=7,GH=9,TIME_LIMIT=180,URGENT=30;
const THEMES={
    fruit:['🍇','🍓','🍒','🍊','🍋','🍌','🍎','🍉','🍑','🍍','🥝','🥥','🍈','🥭','🫐'],
    animal:['🐭','🐹','🐰','🦊','🐱','🐶','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐵'],
    seafood:['🦐','🦞','🦀','🦑','🐙','🐟','🐠','🐡','🦈','🐬','🐳','🐋','🦭','🐢','🦦'],
    heart:['❤️','🧡','💛','💚','💙','💜','🤎','🖤','🤍','💔','❣️','💕','💞','💓','💗'],

    food:['🍕','🍔','🍗','🌭','🍟','🍰','🍪','🍩','🥐','🥖','🧀','🥓','🥚','🍱','🍜'],
    vehicle:['🚲','🛴','🏍️','🚗','🚕','🚙','🚌','🚎','🏎️','🚓','🚑','🚒','🚐','🛻','🚚']
};
const NAMES={fruit:'과일',animal:'동물',seafood:'해산물',heart:'하트',sports:'스포츠',food:'음식',vehicle:'탈것'};
const THEME_KEYS=Object.keys(THEMES);
const SPECIAL_TYPES={time:{emoji:'⏰',cls:'special-time',desc:'더블클릭 → 시간 +10초'},theme:{emoji:'🌀',cls:'special-theme',desc:'클릭 → 테마 선택'}};
const SPECIAL_KEYS=Object.keys(SPECIAL_TYPES);
const FEVER_MAX=12,FEVER_DURATION=10;

let grid,current,score,selected,over,hints,hintTimer,success,ended,timedOut;
let remainingTime,timeInterval,feverGauge=0,feverActive=false,feverInterval=null,feverRemain=0;
let specialItems=[],mergeCount=0,specialSelected=null;
let lastClickTime=0,lastClickCell=null,mergeHighlights=[],finalUsedTime=0;
let specialThreshold=3+Math.floor(Math.random()*3),peakLevel=1;

function showEndingEffect(title,sub,cb){
    const s=document.getElementById('endingScreen');
    document.getElementById('endingTitle').textContent=title;
    document.getElementById('endingSub').textContent=sub;
    s.querySelectorAll('.confetti-piece,.star-piece').forEach(e=>e.remove());
    const cols=['#f59e0b','#ef4444','#ec4899','#8b5cf6','#3b82f6','#10b981','#fbbf24'];
    const stars=['⭐','🌟','✨','💫','🎉','🎊','💥','🏆'];
    for(let i=0;i<200;i++){const el=document.createElement('div');el.className='confetti-piece';el.style.cssText=`left:${Math.random()*100}%;top:-10px;background:${cols[Math.floor(Math.random()*cols.length)]};width:${6+Math.random()*10}px;height:${8+Math.random()*12}px;border-radius:${Math.random()>.5?'50%':'2px'};animation-duration:${1.2+Math.random()*1.3}s;animation-delay:${Math.random()*.8}s;`;s.appendChild(el);}
    for(let i=0;i<30;i++){const el=document.createElement('div');el.className='star-piece';el.textContent=stars[Math.floor(Math.random()*stars.length)];el.style.cssText=`left:${5+Math.random()*90}%;top:${5+Math.random()*90}%;animation-duration:${.8+Math.random()}s;animation-delay:${Math.random()}s;`;s.appendChild(el);}
    s.classList.add('show');
    setTimeout(()=>{s.classList.remove('show');s.querySelectorAll('.confetti-piece,.star-piece').forEach(e=>e.remove());if(cb)cb();},2500);
}

function triggerEnd(type){
    if(type==='timeout'){timedOut=true;finalUsedTime=TIME_LIMIT;if(hintTimer)clearTimeout(hintTimer);endFever();BGM.switchEnding();showEndingEffect('⏰ 시간 종료!',`점수 ${score}점`,()=>render());}
    else if(type==='over'){over=true;finalUsedTime=TIME_LIMIT-remainingTime;clearInterval(timeInterval);endFever();BGM.switchEnding();showEndingEffect('💀 게임 오버',`점수 ${score}점`,()=>render());}
    else if(type==='success'){success=true;finalUsedTime=TIME_LIMIT-remainingTime;clearInterval(timeInterval);BGM.switchEnding();showEndingEffect('🎉 Lv.15 달성!',`점수 ${score}점`,()=>render());}
    else if(type==='ended'){ended=true;finalUsedTime=TIME_LIMIT-remainingTime;clearInterval(timeInterval);if(feverInterval)clearInterval(feverInterval);BGM.switchEnding();showEndingEffect('⏹️ 게임 종료',`점수 ${score}점`,()=>render());}
}

function fitGrid(){
    const c=document.getElementById('gridContainer'),g=document.getElementById('grid');
    const cw=c.clientWidth-16,ch=c.clientHeight-16;
    let gw=Math.min(cw,ch*7/9),gh=gw*9/7;
    if(gh>ch){gh=ch;gw=gh*7/9;}
    g.style.width=gw+'px';g.style.height=gh+'px';
    g.style.fontSize=Math.floor((gh/9)*.6)+'px';
}

function init(){
    grid=Array(GH).fill(0).map(()=>Array(GW).fill(null));
    for(let r=0;r<GH;r++)for(let c=0;c<GW;c++)grid[r][c]=random();
    score=0;selected=null;over=false;success=false;ended=false;timedOut=false;
    hints=[];current=random();remainingTime=TIME_LIMIT;
    feverGauge=0;feverActive=false;feverRemain=0;
    specialItems=[];mergeCount=0;specialSelected=null;mergeHighlights=[];finalUsedTime=0;
    specialThreshold=3+Math.floor(Math.random()*3);peakLevel=1;
    if(feverInterval)clearInterval(feverInterval);
    stopFeverVisuals();
    startTimer();render();startHint();
}

function addFeverGauge(){if(feverActive)return;feverGauge=Math.min(feverGauge+1,FEVER_MAX);if(feverGauge>=FEVER_MAX){feverGauge=0;activateFever();}updateBars();}
function activateFever(){
    feverActive=true;feverRemain=FEVER_DURATION;
    document.getElementById('fever2xBadge').classList.add('show');
    document.getElementById('gridContainer').classList.add('fever-active-border');
    document.getElementById('feverCountdown').textContent=feverRemain;
    updateBars();
    if(feverInterval)clearInterval(feverInterval);
    feverInterval=setInterval(()=>{feverRemain--;document.getElementById('feverCountdown').textContent=feverRemain;if(feverRemain<=0){clearInterval(feverInterval);endFever();}},1000);
    BGM.switchFever();
}
function endFever(){feverActive=false;stopFeverVisuals();updateBars();BGM.switchNormal();}
function stopFeverVisuals(){
    document.getElementById('fever2xBadge').classList.remove('show');
    document.getElementById('gridContainer').classList.remove('fever-active-border');
    if(feverInterval){clearInterval(feverInterval);feverInterval=null;}
}
function calcScore(lv){return feverActive?lv*20:lv*10;}
function updateBars(){document.getElementById('feverBarFill').style.width=(feverGauge/FEVER_MAX*100)+'%';document.getElementById('feverBarCount').textContent=feverActive?`🔥 ${feverRemain}초`:`${feverGauge}/${FEVER_MAX}`;}
function updatePeakLevel(nl){if(nl>peakLevel)peakLevel=nl;}

function trySpawnSpecial(ml){if(ml<3)return;mergeCount++;if(mergeCount>=specialThreshold){mergeCount=0;specialThreshold=3+Math.floor(Math.random()*3);spawnSpecial();}}
function spawnSpecial(){const e=[];for(let r=0;r<GH;r++)for(let c=0;c<GW;c++)if(!grid[r][c]&&!getSpecialAt(r,c))e.push({r,c});if(!e.length)return;const p=e[Math.floor(Math.random()*e.length)];specialItems.push({r:p.r,c:p.c,type:SPECIAL_KEYS[Math.floor(Math.random()*SPECIAL_KEYS.length)]});render();}
function getSpecialAt(r,c){return specialItems.find(s=>s.r===r&&s.c===c)||null;}
function removeSpecialAt(r,c){specialItems=specialItems.filter(s=>!(s.r===r&&s.c===c));}

function applyThemeMerge(theme){
    const byLevel={};
    for(let r=0;r<GH;r++)for(let c=0;c<GW;c++){const item=grid[r][c];if(item&&item.theme===theme&&!getSpecialAt(r,c)){if(!byLevel[item.level])byLevel[item.level]=[];byLevel[item.level].push({r,c});}}
    const levels=Object.keys(byLevel).map(Number).sort((a,b)=>a-b);
    let merged=false;const newItems=[];
    for(const lv of levels){const cells=byLevel[lv];if(!cells||cells.length<2||lv>=14)continue;merged=true;const nl=lv+1,pc=Math.floor(cells.length/2);for(let i=0;i<pc*2;i++)grid[cells[i].r][cells[i].c]=null;for(let i=0;i<pc;i++){const{r,c}=cells[i];grid[r][c]={theme,level:nl};newItems.push({r,c});score+=calcScore(nl);updatePeakLevel(nl+1);if(nl===14){triggerEnd('success');return;}}}
    if(!merged){showToast('합칠 수 있는 아이템이 없어요!');render();return;}
    mergeHighlights=newItems;render();setTimeout(()=>{mergeHighlights=[];render();},1500);checkOver();startHint();
}

function showToast(msg){let t=document.getElementById('toast');if(!t){t=document.createElement('div');t.id='toast';Object.assign(t.style,{position:'fixed',bottom:'60px',left:'50%',transform:'translateX(-50%)',background:'rgba(0,0,0,0.75)',color:'white',padding:'8px 16px',borderRadius:'20px',fontSize:'13px',zIndex:'99998',transition:'opacity 0.3s',pointerEvents:'none'});document.body.appendChild(t);}t.textContent=msg;t.style.opacity='1';clearTimeout(t._to);t._to=setTimeout(()=>t.style.opacity='0',1800);}

function clickCell(r,c){
    if(over||success||ended||timedOut)return;
    const sp=getSpecialAt(r,c),now=Date.now();
    if(sp){
        const isDbl=now-lastClickTime<400&&lastClickCell&&lastClickCell.r===r&&lastClickCell.c===c;
        lastClickTime=now;lastClickCell={r,c};
        if(sp.type==='time'){if(isDbl){remainingTime=Math.min(remainingTime+10,TIME_LIMIT*2);removeSpecialAt(r,c);showToast('⏰ 시간 +10초!');render();return;}else{if(specialSelected&&specialSelected.r===r&&specialSelected.c===c){specialSelected=null;render();return;}specialSelected={r,c,type:'time'};showToast('⏰ 더블클릭하면 시간 +10초!');render();return;}}
        if(sp.type==='theme'){if(specialSelected&&specialSelected.r===r&&specialSelected.c===c){specialSelected=null;render();return;}specialSelected={r,c,type:'theme'};openThemeSelect();render();return;}
    }
    specialSelected=null;lastClickTime=now;lastClickCell={r,c};
    const isHint=hints.find(h=>h.r===r&&h.c===c);
    if(!isHint){hints=[];if(hintTimer)clearTimeout(hintTimer);}
    if(selected){
        if(selected.r===r&&selected.c===c){selected=null;render();if(!isHint)startHint();return;}
        const tgt=grid[r][c],sel=selected.item;
        if(tgt&&tgt.theme===sel.theme&&tgt.level===sel.level&&sel.level<14){const nl=sel.level+1;grid[r][c]={theme:sel.theme,level:nl};grid[selected.r][selected.c]=null;score+=calcScore(nl);updatePeakLevel(nl+1);addFeverGauge();trySpawnSpecial(nl-1);if(nl===14){triggerEnd('success');return;}selected=null;hints=[];render();checkOver();startHint();}
        else if(!tgt){grid[r][c]=sel;grid[selected.r][selected.c]=null;selected=null;render();startHint();}
        else{grid[r][c]=sel;grid[selected.r][selected.c]=tgt;selected=null;render();startHint();}
        return;
    }
    if(current){
        const tgt=grid[r][c];
        if(tgt&&tgt.theme===current.theme&&tgt.level===current.level&&current.level<14){const nl=current.level+1;grid[r][c]={theme:current.theme,level:nl};score+=calcScore(nl);updatePeakLevel(nl+1);addFeverGauge();trySpawnSpecial(nl-1);if(nl===14){triggerEnd('success');return;}current=random();hints=[];render();checkOver();startHint();}
        else if(!tgt){grid[r][c]=current;current=random();render();checkOver();startHint();}
        else{selected={r,c,item:tgt};render();if(!isHint)startHint();}
    } else if(grid[r][c]){selected={r,c,item:grid[r][c]};render();if(!isHint)startHint();}
}

function openThemeSelect(){
    const g=document.getElementById('themeSelectGrid');g.innerHTML='';
    THEME_KEYS.forEach(tk=>{const btn=document.createElement('button');btn.className='theme-btn';btn.innerHTML=`<span class="t-emoji">${THEMES[tk][0]}</span><span>${NAMES[tk]}</span>`;btn.onclick=()=>{document.getElementById('themeSelectPopup').classList.remove('show');if(specialSelected){removeSpecialAt(specialSelected.r,specialSelected.c);specialSelected=null;}applyThemeMerge(tk);};g.appendChild(btn);});
    document.getElementById('themeSelectPopup').classList.add('show');
}

function render(){
    document.getElementById('score').textContent=score;
    document.getElementById('hintCount').textContent=hints.length;
    if(current){document.getElementById('nextEmoji').textContent=THEMES[current.theme][current.level];document.getElementById('nextName').textContent=NAMES[current.theme];document.getElementById('nextLevel').textContent=`Lv.${current.level+1}`;}
    updateTimeDisplay();updateBars();
    let instr='💡 클릭 선택 → 다른 칸으로 이동/합치기';
    if(specialSelected){instr=specialSelected.type==='time'?'⏰ 더블클릭하면 시간 +10초! (재클릭 취소)':'🌀 테마 선택 중...';}
    document.getElementById('instrText').textContent=instr;
    ['gameSuccessBox','gameOverBox','gameTimeoutBox','gameEndBox'].forEach(id=>document.getElementById(id).style.display='none');
    if(success){document.getElementById('gameSuccessBox').style.display='block';document.getElementById('successScore').textContent=score;document.getElementById('successTime').textContent=getTimeStr();}
    else if(timedOut){document.getElementById('gameTimeoutBox').style.display='block';document.getElementById('timeoutLevel').textContent=peakLevel;document.getElementById('timeoutScore').textContent=score;}
    else if(ended){document.getElementById('gameEndBox').style.display='block';document.getElementById('endLevel').textContent=peakLevel;document.getElementById('endScore').textContent=score;}
    else if(over){document.getElementById('gameOverBox').style.display='block';document.getElementById('finalScore').textContent=score;document.getElementById('finalLevel').textContent=peakLevel;}
    const g=document.getElementById('grid');g.innerHTML='';
    if(ended||over||success||timedOut)return;
    for(let r=0;r<GH;r++){for(let c=0;c<GW;c++){const cell=document.createElement('div');cell.className='cell';const sp=getSpecialAt(r,c),item=grid[r][c];if(sp){cell.classList.add(SPECIAL_TYPES[sp.type].cls);cell.textContent=SPECIAL_TYPES[sp.type].emoji;cell.title=SPECIAL_TYPES[sp.type].desc;if(specialSelected&&specialSelected.r===r&&specialSelected.c===c)cell.classList.add('special-selected');}else if(item){cell.classList.add('has-item');cell.textContent=THEMES[item.theme][item.level];if(selected&&selected.r===r&&selected.c===c)cell.classList.add('selected');if(!specialSelected&&hints.find(h=>h.r===r&&h.c===c))cell.classList.add('hint');if(mergeHighlights.find(h=>h.r===r&&h.c===c))cell.classList.add('merge-highlight');}cell.onclick=()=>clickCell(r,c);g.appendChild(cell);}}
    fitGrid();
}

function random(){return{theme:THEME_KEYS[Math.floor(Math.random()*THEME_KEYS.length)],level:Math.floor(Math.random()*3)};}
function startTimer(){if(timeInterval)clearInterval(timeInterval);timeInterval=setInterval(()=>{if(!over&&!success&&!ended&&!timedOut){remainingTime--;updateTimeDisplay();if(remainingTime<=0){clearInterval(timeInterval);triggerEnd('timeout');}}},1000);}
function updateTimeDisplay(){const m=Math.floor(remainingTime/60),s=remainingTime%60;document.getElementById('time').textContent=`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;const d=document.getElementById('timeDisplay');remainingTime<=URGENT?d.classList.add('urgent'):d.classList.remove('urgent');}
function getTimeStr(){const m=Math.floor(remainingTime/60),s=remainingTime%60;return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
function checkOver(){for(let r=0;r<GH;r++)for(let c=0;c<GW;c++)if(!grid[r][c]&&!getSpecialAt(r,c))return;const map=new Map();for(let r=0;r<GH;r++)for(let c=0;c<GW;c++){const item=grid[r][c];if(!item||item.level>=14)continue;const k=`${item.theme}-${item.level}`;map.set(k,(map.get(k)||0)+1);if(map.get(k)>=2)return;}if(current&&current.level<14){const k=`${current.theme}-${current.level}`;if(map.get(k)>=1)return;}triggerEnd('over');}
function startHint(){if(hintTimer)clearTimeout(hintTimer);hintTimer=setTimeout(()=>{const map=new Map();for(let r=0;r<GH;r++)for(let c=0;c<GW;c++){const item=grid[r][c];if(!item||item.level>=14)continue;const k=`${item.theme}-${item.level}`;if(!map.has(k))map.set(k,[]);map.get(k).push({r,c});}for(const[,ps]of map){if(ps.length>=2){hints=ps.sort(()=>Math.random()-.5).slice(0,2);render();return;}}hints=[];render();},10000);}
function fillEmpty(){if(over||success||ended||timedOut)return;for(let r=0;r<GH;r++)for(let c=0;c<GW;c++)if(!grid[r][c]&&!getSpecialAt(r,c))grid[r][c]=random();render();checkOver();startHint();}

function resetGame(){
    if(hintTimer)clearTimeout(hintTimer);
    if(timeInterval)clearInterval(timeInterval);
    if(feverInterval)clearInterval(feverInterval);
    BGM.restart();
    init();
}

function showHelp(){
    const c=document.getElementById('helpContent');
    c.innerHTML=`<div class="theme-section"><div class="theme-title">🔥 피버 시스템</div><div style="font-size:12px;color:#555;line-height:1.8;">• 합치기 성공 시마다 피버 게이지 +1<br>• 게이지 12칸 채우면 <b>자동으로 피버 발동</b><br>• 피버 중 <b>10초간 점수 2배!</b></div></div><div class="theme-section"><div class="theme-title">✨ 특수 아이템</div><div style="font-size:12px;color:#555;line-height:2;"><b>⏰ 타임+10</b> : 더블클릭 → 시간 +10초<br><b>🌀 테마합치기</b> : 클릭 → 테마 선택 → 해당 테마 전부 자동 합치기</div></div>`;
    for(const[tk,emojis]of Object.entries(THEMES)){const sec=document.createElement('div');sec.className='theme-section';const tit=document.createElement('div');tit.className='theme-title';tit.textContent=NAMES[tk];sec.appendChild(tit);const chain=document.createElement('div');chain.className='evolution-chain';for(let i=0;i<15;i++){const it=document.createElement('div');it.className='evo-item';const em=document.createElement('div');em.className='evo-emoji';em.textContent=emojis[i];const lv=document.createElement('div');lv.className='evo-level';lv.textContent=`Lv.${i+1}`;it.appendChild(em);it.appendChild(lv);chain.appendChild(it);if(i<14){const ar=document.createElement('div');ar.className='arrow';ar.textContent='→';chain.appendChild(ar);}}sec.appendChild(chain);c.appendChild(sec);}
    document.getElementById('helpPopup').classList.add('show');
}

document.getElementById('fillBtn').addEventListener('click',fillEmpty);
document.getElementById('resetBtn').addEventListener('click',resetGame);
document.getElementById('helpBtn').addEventListener('click',showHelp);
document.getElementById('closeHelp').addEventListener('click',()=>document.getElementById('helpPopup').classList.remove('show'));
document.getElementById('rankingBtn').addEventListener('click',()=>document.getElementById('rankingPopup').classList.add('show'));
document.getElementById('closeRanking').addEventListener('click',()=>document.getElementById('rankingPopup').classList.remove('show'));
document.getElementById('rankingPopup').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('rankingPopup').classList.remove('show');});
document.getElementById('helpPopup').addEventListener('click',e=>{if(e.target===e.currentTarget)document.getElementById('helpPopup').classList.remove('show');});
document.getElementById('submitSuccess').addEventListener('click',()=>alert('미리보기 모드'));
document.getElementById('submitOver').addEventListener('click',()=>alert('미리보기 모드'));
document.getElementById('submitTimeout').addEventListener('click',()=>alert('미리보기 모드'));
document.getElementById('submitEnd').addEventListener('click',()=>alert('미리보기 모드'));
document.getElementById('cancelThemeBtn').addEventListener('click',()=>{document.getElementById('themeSelectPopup').classList.remove('show');specialSelected=null;render();});
document.getElementById('endBtn').addEventListener('click',()=>document.getElementById('confirmPopup').style.display='flex');
document.getElementById('confirmNo').addEventListener('click',()=>document.getElementById('confirmPopup').style.display='none');
document.getElementById('confirmYes').addEventListener('click',()=>{
    document.getElementById('confirmPopup').style.display='none';
    if(hintTimer)clearTimeout(hintTimer);
    if(timeInterval)clearInterval(timeInterval);
    if(feverInterval)clearInterval(feverInterval);
    finalUsedTime=TIME_LIMIT-remainingTime;
    showEndingEffect('⏹️ 게임 종료',`점수 ${score}점`,()=>{ended=true;render();});
    BGM.switchEnding();
});

function setVH(){document.documentElement.style.setProperty('--vh',(window.innerHeight*.01)+'px');}
window.addEventListener('resize',()=>{setVH();fitGrid();});
window.addEventListener('orientationchange',()=>{setVH();setTimeout(fitGrid,300);});
setVH();init();
</script>
</body>
